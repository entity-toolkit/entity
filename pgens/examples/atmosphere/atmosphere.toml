[simulation]
  name    = "atmosphere"
  engine  = "srpic"
  runtime = 1.0

[grid]
  resolution = [2048]
  extent     = [[0.0, 2.0]]

  [grid.metric]
    metric = "minkowski"

  [grid.boundaries]
    fields    = [["ATMOSPHERE", "FIXED"]]
    particles = [["ATMOSPHERE", "REFLECT"]]

    [grid.boundaries.atmosphere]
      temperature = 0.1
      density     = 10.0
      height      = 0.1
      species     = [1, 2]
      ds          = 0.7

[scales]
  larmor0    = 0.01
  skindepth0 = 0.01

[algorithms]

  [algorithms.deposit]
    enable = false

  [algorithms.timestep]
    CFL = 0.5

[particles]
  ppc0 = 128.0

  [[particles.species]]
    label    = "e+"
    mass     = 1.0
    charge   = 1.0
    maxnpart = 1e5

  [[particles.species]]
    label    = "e-"
    mass     = 1.0
    charge   = -1.0
    maxnpart = 1e5

[output]
  interval = 10

  [output.fields]
    quantities = ["N_1_2"]

  [output.particles]
    enable = false

  [output.spectra]
    enable = false

[checkpoint]
  keep = 0

[diagnostics]
  colored_stdout = true
